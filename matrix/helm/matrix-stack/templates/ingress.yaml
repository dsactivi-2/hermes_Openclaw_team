{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "matrix-stack.fullname" . }}-matrix
  labels:
    {{- include "matrix-stack.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.tls.clusterIssuer | quote }}
    {{- include "matrix-stack.nginxPublicAnnotations" . | nindent 4 }}
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- if .Values.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.domains.matrix | quote }}
      secretName: {{ .Values.tls.secretNames.matrix | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.domains.matrix | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "matrix-stack.fullname" . }}-synapse
                port:
                  name: http
---
