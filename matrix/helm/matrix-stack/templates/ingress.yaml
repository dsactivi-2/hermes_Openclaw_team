---
{{- if .Values.ketesa.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "matrix-stack.fullname" . }}-ketesa
  labels:
    {{- include "matrix-stack.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.tls.clusterIssuer | quote }}
    {{- include "matrix-stack.nginxAdminAnnotations" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- if .Values.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.domains.ketesa | quote }}
      secretName: {{ .Values.tls.secretNames.ketesa | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.domains.ketesa | quote }}
      http:
        paths:
          - path: /_matrix
            pathType: Prefix
            backend:
              service:
                name: {{ include "matrix-stack.fullname" . }}-synapse
                port:
                  name: http
          - path: /_synapse/admin
            pathType: Prefix
            backend:
              service:
                name: {{ include "matrix-stack.fullname" . }}-synapse
                port:
                  name: http
          - path: /.well-known/matrix
            pathType: Prefix
            backend:
              service:
                name: {{ include "matrix-stack.fullname" . }}-synapse
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "matrix-stack.fullname" . }}-ketesa
                port:
                  name: http
{{- end }}
{{- end }}
